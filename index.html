<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자동 원반 돌리기 우선순위 결정기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
        }
        .panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 280px;
            flex: 1;
        }
        textarea {
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary { background-color: #4e73df; color: white; }
        .btn-primary:hover { background-color: #2e59d9; }
        .btn-success { background-color: #1cc88a; color: white; }
        .btn-success:hover { background-color: #17a673; }
        .btn-success:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .roulette-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1.5;
        }
        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #e74a3b;
            position: absolute;
            top: -10px;
            z-index: 10;
        }
        .canvas-container {
            position: relative;
            width: 350px;
            height: 350px;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1); /* 연속 회전을 위해 돌리는 시간 1.5초로 단축 */
        }
        
        .ranking-list {
            list-style: none;
            padding: 0;
        }
        .ranking-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            animation: fadeIn 0.5s ease-in-out;
        }
        .rank-num {
            font-weight: bold;
            color: #4e73df;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>🎯 자동 연속 원반 돌리기</h1>

    <div class="container">
        <div class="panel">
            <h3>1. 데이터 입력</h3>
            <textarea id="inputData" placeholder="한 줄에 하나씩 항목을 입력하세요.&#10;예시:&#10;오징어덮밥&#10;돈까스&#10;코다리&#10;부대찌개&#10;갈비탕"></textarea>
            <button id="initBtn" class="btn-primary" onclick="initRoulette()">원반 생성/초기화</button>
            
            <div style="margin-top: 20px;">
                <p id="statusText" style="font-weight: bold; color: #555; line-height: 1.6;"></p>
            </div>
        </div>

        <div class="roulette-area">
            <div class="pointer"></div>
            <div class="canvas-container">
                <canvas id="rouletteCanvas" width="350" height="350"></canvas>
            </div>
            <button id="spinBtn" class="btn-success" onclick="startAutoSpin()" style="margin-top: 20px; width: 220px;" disabled>자동 전체 돌리기 시작</button>
        </div>

        <div class="panel">
            <h3>📋 결정된 우선순위 순서</h3>
            <ul id="rankingDisplay" class="ranking-list">
                </ul>
        </div>
    </div>

    <script>
        let items = [];
        let ranking = [];
        let currentRotation = 0;
        let isRunning = false;
        
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const colors = ["#ff9ff3", "#feca57", "#ff6b6b", "#48dbfb", "#1dd1a1", "#a29bfe", "#ffeaa7", "#fab1a0", "#74b9ff", "#55efc4"];

        function initRoulette() {
            if (isRunning) return;
            
            const text = document.getElementById('inputData').value.trim();
            if (!text) {
                alert("데이터를 입력해주세요.");
                return;
            }
            
            items = text.split('\n').map(item => item.trim()).filter(item => item !== "");
            
            if (items.length < 2) {
                alert("최소 2개 이상의 항목을 입력해주세요.");
                return;
            }

            ranking = []; 
            document.getElementById('rankingDisplay').innerHTML = "";
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').innerText = "자동 전체 돌리기 시작";
            currentRotation = 0;
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(0deg)`;
            
            updateStatus();
            drawRoulette();
        }

        function drawRoulette() {
            const numSegments = items.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) return;

            items.forEach((item, index) => {
                const startAngle = index * anglePerSegment - Math.PI / 2; 
                const endAngle = startAngle + anglePerSegment;

                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[index % colors.length];
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#333";
                ctx.font = "bold 14px 'Malgun Gothic'";
                ctx.fillText(item, radius - 20, 5);
                ctx.restore();
            });
        }

        // 마스터 제어 함수: 자동 뺑뺑이 루프 시작
        function startAutoSpin() {
            if (isRunning || items.length === 0) return;
            isRunning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('initBtn').disabled = true;
            document.getElementById('spinBtn').innerText = "자동 순위 결정 중...";

            runNextTurn();
        }

        // 재귀적으로 한 턴씩 돌리는 핵심 로직
        function runNextTurn() {
            const numSegments = items.length;

            // 1개만 남았을 때는 돌리지 않고 바로 마지막 순위 꽂고 끝내기
            if (numSegments === 1) {
                finalizeLastItem();
                return;
            }

            // 회전 애니메이션 복구
            canvas.style.transition = 'transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1)';
            
            // 한 번 돌 때 시원하게 돌도록 각도 무작위 추가
            const randomSpin = Math.floor(Math.random() * 360) + 720; 
            currentRotation += randomSpin;
            canvas.style.transform = `rotate(${-currentRotation}deg)`;

            // 1.5초 돌고 멈춘 직후 결과 처리
            setTimeout(() => {
                const actualDegrees = currentRotation % 360;
                const anglePerSegment = 360 / numSegments;
                
                const winningIndex = Math.floor(actualDegrees / anglePerSegment);
                const winner = items[winningIndex];

                // 순위판에 넣고 원반에서 제거
                ranking.push(winner);
                items.splice(winningIndex, 1);

                renderRanking();
                updateStatus();

                // 원반 각도 순간 리셋 (티 안 나게 처리)
                canvas.style.transition = 'none';
                currentRotation = 0;
                canvas.style.transform = `rotate(0deg)`;
                drawRoulette();

                // 0.8초간 당첨된 결과를 눈으로 확인할 시간을 준 뒤, 다음 턴 자동으로 실행
                setTimeout(() => {
                    if (items.length > 0) {
                        runNextTurn(); // 남은 게 있으면 다음 녀석 뽑으러 이동
                    }
                }, 800);

            }, 1500);
        }

        // 마지막 꼴찌 처리 및 완전 종료
        function finalizeLastItem() {
            ranking.push(items[0]);
            items = [];
            
            renderRanking();
            updateStatus();
            
            // 빈 캔버스 클리어
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            isRunning = false;
            document.getElementById('initBtn').disabled = false;
            document.getElementById('spinBtn').innerText = "모든 순위 결정 완료";
        }

        function updateStatus() {
            const statusText = document.getElementById('statusText');
            if (items.length > 0) {
                statusText.innerHTML = `현재 진행 회차: <span style="color:#4e73df;">${ranking.length + 1}위</span> 뽑는 중<br>남은 후보 조각: <span style="color:#e74a3b;">${items.length}개</span>`;
            } else {
                statusText.innerHTML = "🎉 <b>모든 우선순위 배정이 끝났습니다!</b><br>오른쪽 결과 리스트를 확인하며 일을 처리하세요.";
            }
        }

        function renderRanking() {
            const rankingDisplay = document.getElementById('rankingDisplay');
            rankingDisplay.innerHTML = "";
            ranking.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = "ranking-item";
                li.innerHTML = `<span class="rank-num">${index + 1}위</span> <span>${item}</span>`;
                rankingDisplay.appendChild(li);
            });
        }
    </script>
</body>
</html>
