<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Priority To-Do List</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }
        .panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 300px;
            flex: 1;
        }
        
        /* [모바일 우선 배치 설정] 데스크톱 기본 순서 지정 */
        .panel-input { order: 1; }
        .roulette-area { order: 2; }
        .panel-todo { order: 3; }

        textarea {
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            margin-bottom: 10px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4e73df;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary { background-color: #4e73df; color: white; }
        .btn-primary:hover { background-color: #2e59d9; }
        .btn-success { background-color: #1cc88a; color: white; }
        .btn-success:hover { background-color: #17a673; }
        .btn-success:disabled { background-color: #cccccc; cursor: not-allowed; }
        .btn-danger { background-color: #e74a3b; color: white; padding: 6px 10px; font-size: 12px; width: auto; margin: 0; }
        
        /* 백업 존 스타일 */
        .backup-zone {
            background: #f8f9fc;
            border: 1px solid #e3e6f0;
            border-radius: 8px;
            padding: 12px;
            margin-top: 30px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-backup { background-color: #36b9cc; color: white; font-size: 13px; padding: 8px; margin: 0; flex: 1; }
        .btn-restore { background-color: #f6c23e; color: #333; font-size: 13px; padding: 8px; margin: 0; position: relative; overflow: hidden; text-align: center; border-radius: 6px; font-weight: bold; cursor: pointer;}
        .btn-restore input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .roulette-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1.2;
        }
        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #e74a3b;
            position: absolute;
            top: -10px;
            z-index: 10;
        }
        .canvas-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .session-box {
            background: #f8f9fc;
            border: 1px solid #e3e6f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4e73df;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .session-title {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }
        
        /* 추가 항목 입력 영역 스타일 */
        .session-add-zone {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .session-add-zone input {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        .session-add-zone button {
            width: auto;
            margin: 0;
            padding: 6px 12px;
            font-size: 13px;
            background-color: #4e73df;
            color: white;
            border-radius: 4px;
        }
        .session-add-zone button:hover {
            background-color: #2e59d9;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .todo-item {
            background: white;
            border: 1px solid #dddfeb;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }
        .todo-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .todo-rank {
            font-weight: bold;
            color: #4e73df;
            min-width: 35px;
        }
        .todo-text {
            color: #333;
        }
        .todo-actions button {
            width: auto;
            margin: 0 2px;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            background: #858796;
            color: white;
        }
        .todo-actions .btn-done { background-color: #1cc88a; }
        .todo-actions .btn-delete { background-color: #e74a3b; color: white; }
        
        .status-done { background-color: #eaecf4; opacity: 0.6; }
        .status-done .todo-text { text-decoration: line-through; color: #858796; }

        /* 재지정 후 완료된 항목들이 쌓이는 블랙 스타일 */
        .status-done-archive { background-color: #3a3b45; border-color: #1c1d22; color: #fff; }
        .status-done-archive .todo-text { text-decoration: line-through; color: #b7b9cc; }
        .status-done-archive .todo-rank { color: #f6c23e; }

        /* 📱 모바일 화면 (화면 너비 768px 이하) 미디어 쿼리 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            /* To-Do List 결과 창을 가장 첫 번째(최상단)로 올림 */
            .panel-todo { order: 1; }
            .panel-input { order: 2; }
            .roulette-area { order: 3; }
        }
    </style>
</head>
<body>

    <h1>🎯 Task Priority To-Do List</h1>

    <div class="container">
        <div class="panel panel-input">
            <h3>1. 데이터 입력</h3>
            <div class="input-group">
                <label for="sessionName">📋 무슨 일부터 할까?</label>
                <input type="text" id="sessionName" placeholder="주제를 입력 안 하면 날짜가 자동 지정됩니다.">
            </div>
            <div class="input-group">
                <label for="inputData">✏️ 이것 저것, 할 일이 많네...(한 줄에 하나씩)</label>
                <textarea id="inputData" placeholder="이 일&#10;저 일&#10;그 일"></textarea>
            </div>
            <button id="initBtn" class="btn-primary" onclick="initRoulette()">Spin!</button>
            
            <div style="margin-top: 20px;">
                <p id="statusText" style="font-weight: bold; color: #555; line-height: 1.6;"></p>
            </div>
        </div>

        <div class="roulette-area">
            <div class="pointer"></div>
            <div class="canvas-container">
                <canvas id="rouletteCanvas" width="320" height="320"></canvas>
            </div>
            <button id="spinBtn" class="btn-success" onclick="startAutoSpin()" style="margin-top: 20px; width: 220px;" disabled>Start!!!!</button>
        </div>

        <div class="panel panel-todo">
            <h3>📋 To-Do List</h3>
            <div id="todoContainer"></div>
        </div>
    </div>

    <div class="backup-zone">
        <button class="btn-backup" onclick="exportData()">💾 전체 백업 (파일 다운)</button>
        <div class="btn-restore">
            📂 백업 복구 (파일 선택)
            <input type="file" id="importFile" accept=".json" onchange="importData(this)">
        </div>
    </div>

    <script>
        let items = [];
        let ranking = [];
        let currentRotation = 0;
        let isRunning = false;
        let savedSessions = []; 
        
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const colors = ["#ff9ff3", "#feca57", "#ff6b6b", "#48dbfb", "#1dd1a1", "#a29bfe", "#ffeaa7", "#fab1a0", "#74b9ff", "#55efc4"];

        window.onload = function() {
            if(localStorage.getItem('rouletteTodoSessions')) {
                savedSessions = JSON.parse(localStorage.getItem('rouletteTodoSessions'));
                renderAllSessions();
            }
        };

        function exportData() {
            if (savedSessions.length === 0) {
                alert("백업할 데이터가 없습니다.");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedSessions));
            const downloadAnchor = document.createElement('a');
            
            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `kinocine_todo_backup_${dateStr}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm("기존 스마트폰의 데이터에 백업 파일을 합치시겠습니까?\n(취소를 누르면 기존 데이터를 지우고 백업 파일로 완전히 대체합니다)")) {
                            const currentIds = savedSessions.map(s => s.id);
                            imported.forEach(session => {
                                if (!currentIds.includes(session.id)) {
                                    savedSessions.push(session);
                                }
                            });
                            savedSessions.sort((a,b) => b.id - a.id);
                        } else {
                            savedSessions = imported;
                        }
                        saveToLocalStorage();
                        renderAllSessions();
                        alert("성공적으로 데이터를 복구했습니다!");
                    } else {
                        alert("올바른 백업 파일 형식이 아닙니다.");
                    }
                } catch (err) {
                    alert("파일을 읽는 중 오류가 발생했습니다.");
                }
            };
            reader.readAsText(file);
            input.value = ""; 
        }

        function initRoulette() {
            if (isRunning) return;
            const text = document.getElementById('inputData').value.trim();
            if (!text) { alert("데이터를 입력해주세요."); return; }
            items = text.split('\n').map(item => item.trim()).filter(item => item !== "");
            if (items.length < 2) { alert("최소 2개 이상의 항목을 입력해주세요."); return; }

            ranking = []; 
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').innerText = "자동 전체 돌리기 시작";
            currentRotation = 0;
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(0deg)`;
            updateStatus();
            drawRoulette();
        }

        function drawRoulette() {
            const numSegments = items.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (numSegments === 0) return;

            items.forEach((item, index) => {
                const startAngle = index * anglePerSegment - Math.PI / 2; 
                const endAngle = startAngle + anglePerSegment;
                ctx.beginPath(); ctx.moveTo(radius, radius); ctx.arc(radius, radius, radius, startAngle, endAngle); ctx.closePath();
                ctx.fillStyle = colors[index % colors.length]; ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(radius, radius); ctx.rotate(startAngle + anglePerSegment / 2); ctx.textAlign = "right"; ctx.fillStyle = "#333"; ctx.font = "bold 13px 'Malgun Gothic'";
                ctx.fillText(item.length > 8 ? item.substring(0,7)+".." : item, radius - 15, 5); ctx.restore();
            });
        }

        function startAutoSpin() {
            if (isRunning || items.length === 0) return;
            isRunning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('initBtn').disabled = true;
            document.getElementById('spinBtn').innerText = "자동 순위 결정 중...";
            runNextTurn();
        }

        function runNextTurn() {
            const numSegments = items.length;
            if (numSegments === 1) { finalizeLastItem(); return; }
            canvas.style.transition = 'transform 1.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
            const randomSpin = Math.floor(Math.random() * 360) + 720; 
            currentRotation += randomSpin;
            canvas.style.transform = `rotate(${-currentRotation}deg)`;

            setTimeout(() => {
                const actualDegrees = currentRotation % 360;
                const anglePerSegment = 360 / numSegments;
                const winningIndex = Math.floor(actualDegrees / anglePerSegment);
                const winner = items[winningIndex];
                ranking.push(winner); items.splice(winningIndex, 1);
                updateStatus();
                canvas.style.transition = 'none'; currentRotation = 0; canvas.style.transform = `rotate(0deg)`; drawRoulette();
                setTimeout(() => { if (items.length > 0) runNextTurn(); }, 500);
            }, 1200);
        }

        function finalizeLastItem() {
            ranking.push(items[0]); items = []; updateStatus(); ctx.clearRect(0, 0, canvas.width, canvas.height);
            saveNewSession();
            isRunning = false;
            document.getElementById('initBtn').disabled = false;
            document.getElementById('spinBtn').innerText = "새로운 원반 대기 중";
        }

        function saveNewSession() {
            let title = document.getElementById('sessionName').value.trim();
            if (!title) {
                const now = new Date();
                title = `${now.getMonth()+1}/${now.getDate()} 작업 리스트 (0개)`;
            }
            title = title.replace(/\(\d+개\)/, `(${ranking.length}개)`);

            const todoItems = ranking.map((task, idx) => { return { rank: idx + 1, text: task, status: 'ready' }; });
            const newSession = { id: Date.now(), title: title, todos: todoItems };
            savedSessions.unshift(newSession);
            saveToLocalStorage();
            renderAllSessions();
            document.getElementById('sessionName').value = ""; document.getElementById('inputData').value = "";
        }

        function saveToLocalStorage() { localStorage.setItem('rouletteTodoSessions', JSON.stringify(savedSessions)); }

        function renderAllSessions() {
            const container = document.getElementById('todoContainer');
            container.innerHTML = "";
            if(savedSessions.length === 0) {
                container.innerHTML = "<p style='color:#858796; text-align:center;'>결정된 할 일 상자가 비어있습니다.</p>";
                return;
            }
            savedSessions.forEach(session => {
                const sBox = document.createElement('div'); sBox.className = "session-box";
                const sHeader = document.createElement('div'); sHeader.className = "session-header";
                sHeader.innerHTML = `<span class="session-title">📋 ${session.title}</span><button class="btn-danger" onclick="deleteSession(${session.id})">삭제</button>`;
                sBox.appendChild(sHeader);

                const addZone = document.createElement('div');
                addZone.className = "session-add-zone";
                addZone.innerHTML = `
                    <input type="text" id="addInput_${session.id}" placeholder="새 일 추가 (여러 개는 쉼표나 세미콜론 구분)">
                    <button onclick="reSpinWithNewItems(${session.id})">추가 후 재지정</button>
                `;
                sBox.appendChild(addZone);

                const tList = document.createElement('ul'); tList.className = "todo-list";
                session.todos.forEach(todo => {
                    const tItem = document.createElement('li'); tItem.className = `todo-item status-${todo.status}`;
                    
                    let actionHtml = '';
                    if (todo.status === 'done-archive') {
                        actionHtml = `<button onclick="changeStatus(${session.id}, ${todo.rank}, 'ready')">되돌리기</button>`;
                    } else {
                        actionHtml = `
                            ${todo.status !== 'done' ? `<button class="btn-done" onclick="changeStatus(${session.id}, ${todo.rank}, 'done')">완료</button>` : ''}
                            ${todo.status === 'ready' ? `<button class="btn-delete" onclick="deleteTask(${session.id}, ${todo.rank})">삭제</button>` : ''}
                            ${todo.status !== 'ready' ? `<button onclick="changeStatus(${session.id}, ${todo.rank}, 'ready')">되돌리기</button>` : ''}
                        `;
                    }

                    tItem.innerHTML = `
                        <div class="todo-left">
                            <span class="todo-rank">${todo.status === 'done-archive' ? '완료' : todo.rank + '위'}</span>
                            <span class="todo-text">${todo.text}</span>
                        </div>
                        <div class="todo-actions">${actionHtml}</div>`;
                    tList.appendChild(tItem);
                });
                sBox.appendChild(tList); container.appendChild(sBox);
            });
        }

        /* [삭제] 버튼 클릭 시 해당 항목을 데이터에서 완전히 제거하고 자동 재지정 로직 연동 */
        function deleteTask(sessionId, rank) {
            const session = savedSessions.find(s => s.id === sessionId);
            if (!session) return;

            // 목록에서 아예 삭제할 항목의 인덱스 찾기
            const todoIndex = session.todos.findIndex(t => t.rank === rank);
            if (todoIndex === -1) return;

            // 알림창 확인 후 진행
            if (!confirm(`'${session.todos[todoIndex].text}' 항목을 목록에서 완전히 삭제하고 순위를 초고속으로 재지정합니까?`)) {
                return;
            }

            // 항목 제거
            session.todos.splice(todoIndex, 1);

            // 보존할 완료 항목과 활성(남은) 항목 구분
            const archivedTasks = session.todos.filter(todo => todo.status === 'done-archive');
            const activeTasks = session.todos.filter(todo => todo.status !== 'done-archive').map(todo => todo.text);

            // 남아 있는 활성 항목 순위 재지정 처리 (1개 이하면 그냥 바로 1위 지정 처리)
            let newTodoItems = [];
            if (activeTasks.length > 0) {
                let shuffledActive = [...activeTasks];
                let newRanking = [];
                while (shuffledActive.length > 0) {
                    let randIdx = Math.floor(Math.random() * shuffledActive.length);
                    newRanking.push(shuffledActive.splice(randIdx, 1)[0]);
                }
                newTodoItems = newRanking.map((task, idx) => {
                    return { rank: idx + 1, text: task, status: 'ready' };
                });
            }

            // 최종 결합 및 타이틀 업데이트
            const finalTodoItems = [...newTodoItems, ...archivedTasks];
            let baseTitle = session.title.replace(/ \(\d+개\)/, "").trim();
            
            // 버전 관리 업데이트 규칙 적용
            let versionMatch = baseTitle.match(/ver\.(\d+)/);
            if (versionMatch) {
                let nextVer = parseInt(versionMatch[1]) + 1;
                baseTitle = baseTitle.replace(/ver\.\d+/, `ver.${nextVer}`);
            } else {
                baseTitle = baseTitle.replace(/ 수정본/g, "") + " ver.1";
            }

            session.title = baseTitle + ` (${finalTodoItems.length}개)`;
            session.todos = finalTodoItems;
            session.id = Date.now(); // 상단 재배치용 ID 갱신

            savedSessions.sort((a,b) => b.id - a.id);
            saveToLocalStorage();
            renderAllSessions();

            document.getElementById('statusText').innerHTML = "⚡ <b>항목이 삭제되었으며, 목록이 자동으로 재지정되었습니다.</b>";
        }

        function reSpinWithNewItems(sessionId) {
            if (isRunning) { alert("현재 룰렛이 작동 중입니다."); return; }
            
            const session = savedSessions.find(s => s.id === sessionId);
            if (!session) return;

            const inputEl = document.getElementById(`addInput_${sessionId}`);
            const newText = inputEl.value.trim();
            
            const remainingTasks = session.todos
                .filter(todo => todo.status !== 'done' && todo.status !== 'done-archive')
                .map(todo => todo.text);

            const archivedTasks = session.todos
                .filter(todo => todo.status === 'done' || todo.status === 'done-archive')
                .map(todo => {
                    return { rank: 0, text: todo.text, status: 'done-archive' };
                });

            let newTasks = [];
            if (newText) {
                newTasks = newText.split(/[,;\n]/).map(t => t.trim()).filter(t => t !== "");
            }

            const activeTasks = [...remainingTasks, ...newTasks];

            if (activeTasks.length < 2) {
                alert("기존 남은 일과 새 일을 합쳐 최소 2개 이상의 활성 항목이 필요합니다.");
                return;
            }

            if(!confirm("이 상자의 미완료 목록과 새 항목을 합쳐 초고속으로 재지정합니다.")) {
                return;
            }

            let baseTitle = session.title.replace(/ \(\d+개\)/, "").trim();
            let versionMatch = baseTitle.match(/ver\.(\d+)/);
            
            if (versionMatch) {
                let nextVer = parseInt(versionMatch[1]) + 1;
                baseTitle = baseTitle.replace(/ver\.\d+/, `ver.${nextVer}`);
            } else {
                baseTitle = baseTitle.replace(/ 수정본/g, ""); 
                baseTitle = baseTitle + " ver.1";
            }

            let shuffledActive = [...activeTasks];
            let newRanking = [];
            while (shuffledActive.length > 0) {
                let randIdx = Math.floor(Math.random() * shuffledActive.length);
                newRanking.push(shuffledActive.splice(randIdx, 1)[0]);
            }

            const newTodoItems = newRanking.map((task, idx) => {
                return { rank: idx + 1, text: task, status: 'ready' };
            });

            const finalTodoItems = [...newTodoItems, ...archivedTasks];
            const totalCountTitle = baseTitle + ` (${finalTodoItems.length}개)`;

            session.title = totalCountTitle;
            session.todos = finalTodoItems;
            session.id = Date.now(); 

            savedSessions.sort((a,b) => b.id - a.id);
            saveToLocalStorage();
            renderAllSessions();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('sessionName').value = "";
            document.getElementById('inputData').value = "";
            document.getElementById('statusText').innerHTML = "⚡ <b>초고속 재지정이 완료되어 목록이 갱신되었습니다! (완료 항목 하단 보존)</b>";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeStatus(sessionId, rank, nextStatus) {
            const session = savedSessions.find(s => s.id === sessionId);
            if (session) {
                const todo = session.todos.find(t => t.rank === rank || (t.status === 'done-archive' && rank === 0));
                if (todo) {
                    todo.status = nextStatus;
                    if (nextStatus === 'ready') {
                        if(rank === 0) {
                            const maxRank = session.todos.reduce((max, t) => t.rank > max ? t.rank : max, 0);
                            todo.rank = maxRank + 1;
                        }
                        session.todos.sort((a, b) => {
                            if(a.status === 'done-archive' && b.status !== 'done-archive') return 1;
                            if(a.status !== 'done-archive' && b.status === 'done-archive') return -1;
                            return a.rank - b.rank;
                        });
                    }
                    saveToLocalStorage(); renderAllSessions();
                }
            }
        }

        function deleteSession(sessionId) {
            if(confirm("이 작업 상자 목록을 완전히 삭제하시겠습니까?")) {
                savedSessions = savedSessions.filter(s => s.id !== sessionId);
                saveToLocalStorage(); renderAllSessions();
            }
        }

        function updateStatus() {
            const statusText = document.getElementById('statusText');
            if (items.length > 0) { statusText.innerHTML = `현재 진행: <span style="color:#4e73df;">${ranking.length + 1}위</span> 선별 중<br>남은 항목: <span style="color:#e74a3b;">${items.length}개</span>`; }
            else { statusText.innerHTML = "🎉 <b>원반 뽑기가 완료되어 우측에 할 일 상자가 추가되었습니다!</b>"; }
        }
    </script>
</body>
</html>
