<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원반 돌리기 우선순위 게임</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
        }
        /* 입력 및 결과 창 스타일 */
        .panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 280px;
            flex: 1;
        }
        textarea {
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary { background-color: #4e73df; color: white; }
        .btn-primary:hover { background-color: #2e59d9; }
        .btn-success { background-color: #1cc88a; color: white; }
        .btn-success:hover { background-color: #17a673; }
        .btn-success:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* 룰렛 비주얼 스타일 */
        .roulette-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1.5;
        }
        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #e74a3b;
            position: absolute;
            top: -10px;
            z-index: 10;
        }
        .canvas-container {
            position: relative;
            width: 350px;
            height: 350px;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.1, 1);
        }
        
        /* 순위 리스트 스타일 */
        .ranking-list {
            list-style: none;
            padding: 0;
        }
        .ranking-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
        }
        .rank-num {
            font-weight: bold;
            color: #4e73df;
        }
    </style>
</head>
<body>

    <h1>🎯 원반 돌리기 우선순위 결정기</h1>

    <div class="container">
        <div class="panel">
            <h3>1. 데이터 입력 (5개~10개)</h3>
            <textarea id="inputData" placeholder="한 줄에 하나씩 항목을 입력하세요.&#10;예시:&#10;오징어덮밥&#10;돈까스&#10;코다리&#10;부대찌개&#10;갈비탕&#10;쭈꾸미"></textarea>
            <button class="btn-primary" onclick="initRoulette()">원반 생성/초기화</button>
            
            <div style="margin-top: 20px;">
                <p id="statusText" style="font-weight: bold; color: #555;"></p>
            </div>
        </div>

        <div class="roulette-area">
            <div class="pointer"></div>
            <div class="canvas-container">
                <canvas id="rouletteCanvas" width="350" height="350"></canvas>
            </div>
            <button id="spinBtn" class="btn-success" onclick="spinRoulette()" style="margin-top: 20px; width: 200px;" disabled>돌리기 (Spin)</button>
        </div>

        <div class="panel">
            <h3>📋 결정된 우선순위</h3>
            <ul id="rankingDisplay" class="ranking-list">
                </ul>
        </div>
    </div>

    <script>
        let items = [];
        let ranking = [];
        let currentRotation = 0;
        let isSpinning = false;
        
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const colors = ["#ff9ff3", "#feca57", "#ff6b6b", "#48dbfb", "#1dd1a1", "#a29bfe", "#ffeaa7", "#fab1a0", "#74b9ff", "#55efc4"];

        // 1. 원반 초기화 및 그리기
        function initRoulette() {
            if (isSpinning) return;
            
            const text = document.getElementById('inputData').value.trim();
            if (!text) {
                alert("데이터를 입력해주세요.");
                return;
            }
            
            items = text.split('\n').map(item => item.trim()).filter(item => item !== "");
            
            if (items.length < 2) {
                alert("최소 2개 이상의 항목을 입력해주세요.");
                return;
            }

            ranking = []; // 순위 초기화
            document.getElementById('rankingDisplay').innerHTML = "";
            document.getElementById('spinBtn').disabled = false;
            currentRotation = 0;
            canvas.style.transform = `rotate(0deg)`;
            
            updateStatus();
            drawRoulette();
        }

        // 원반 그래픽 그리기
        function drawRoulette() {
            const numSegments = items.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) return;

            items.forEach((item, index) => {
                const startAngle = index * anglePerSegment - Math.PI / 2; // 12시 방향 시작 조정
                const endAngle = startAngle + anglePerSegment;

                // 조각 그리기
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[index % colors.length];
                ctx.fill();
                ctx.stroke();

                // 텍스트 그리기
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#333";
                ctx.font = "bold 14px 'Malgun Gothic'";
                ctx.fillText(item, radius - 20, 5);
                ctx.restore();
            });
        }

        // 2. 원반 돌리기 액션
        function spinRoulette() {
            if (isSpinning || items.length === 0) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            const numSegments = items.length;
            
            // 1명이 남았을 때는 돌릴 필요 없이 바로 마지막 순위 확정
            if (numSegments === 1) {
                finalizeLastItem();
                return;
            }

            // 무작위 회전 각도 계산 (최소 4바퀴 이상 돌게 설정)
            const randomSpin = Math.floor(Math.random() * 360) + 1440; 
            currentRotation += randomSpin;
            
            // CSS 변형을 통해 부드럽게 회전 연출
            canvas.style.transform = `rotate(${-currentRotation}deg)`;

            // 애니메이션이 끝나는 시점(4초 후)에 결과 계산
            setTimeout(() => {
                // 현재 멈춘 정면 각도 계산 (12시 방향 빨간 화살표 기준)
                const actualDegrees = currentRotation % 360;
                const anglePerSegment = 360 / numSegments;
                
                // 화살표가 가리키는 인덱스 계산
                const winningIndex = Math.floor(actualDegrees / anglePerSegment);
                const winner = items[winningIndex];

                // 순위 기록 및 원반에서 제거
                ranking.push(winner);
                items.splice(winningIndex, 1);

                // UI 업데이트
                renderRanking();
                updateStatus();

                isSpinning = false;
                
                // 만약 항목이 1개 남았다면 자동으로 마지막 순위가 되므로 바로 마감 처리 유도
                if (items.length === 1) {
                    document.getElementById('spinBtn').innerText = "마지막 순위 확정하기";
                    document.getElementById('spinBtn').disabled = false;
                } else if (items.length > 1) {
                    document.getElementById('spinBtn').disabled = false;
                } else {
                    document.getElementById('spinBtn').innerText = "종료되었습니다";
                }

                // 남은 항목들로 원반 각도 초기화 상태로 새로 그림
                // (각도가 리셋되는 자연스러운 처리를 위해 잠깐 회전 효과 끄고 리셋)
                canvas.style.transition = 'none';
                currentRotation = 0;
                canvas.style.transform = `rotate(0deg)`;
                
                // 브라우저 렌더링 갱신 후 다시 그리기
                setTimeout(() => {
                    canvas.style.transition = 'transform 4s cubic-bezier(0.25, 0.1, 0.1, 1)';
                    drawRoulette();
                }, 50);

            }, 4000);
        }

        // 마지막 1개 남은 아이템 자동 확정 처리
        function finalizeLastItem() {
            ranking.push(items[0]);
            items = [];
            renderRanking();
            updateStatus();
            drawRoulette();
            isSpinning = false;
            document.getElementById('spinBtn').innerText = "정리 완료!";
            document.getElementById('spinBtn').disabled = true;
        }

        // 현재 남은 룰렛 상태 텍스트 노출
        function updateStatus() {
            const statusText = document.getElementById('statusText');
            if (items.length > 0) {
                statusText.innerHTML = `현재 원반에 남은 항목: <span style="color:#e74a3b;">${items.length}개</span><br>다음은 <span style="color:#4e73df;">${ranking.length + 1}위</span>를 뽑을 차례입니다.`;
            } else {
                statusText.innerHTML = "🎉 모든 우선순위가 결정되었습니다!";
            }
        }

        // 우측 순위판 갱신
        function renderRanking() {
            const rankingDisplay = document.getElementById('rankingDisplay');
            rankingDisplay.innerHTML = "";
            ranking.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = "ranking-item";
                li.innerHTML = `<span class="rank-num">${index + 1}위</span> <span>${item}</span>`;
                rankingDisplay.appendChild(li);
            });
        }
    </script>
</body>
</html>
